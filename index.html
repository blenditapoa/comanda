<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🍔 Comanda Central</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍔</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#16110c;--bg2:#1f1812;--panel:#241c14;--panel2:#2c2218;--line:#3a2d20;--line2:#4a3925;
  --ember:#ec6a2c;--ember-soft:#f08a52;--gold:#e0a83e;--cream:#f4ecdf;--muted:#a89578;--muted2:#7d6c52;
  --green:#6fae6a;--red:#d8584c;--blue:#5fa0c0;--r:14px;}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--cream);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Archivo Black',sans-serif;font-weight:400;letter-spacing:-.01em;margin:0}
button,input,select{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
a{color:inherit}
/* layout */
.app{display:flex;min-height:100vh}
.side{width:232px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 18px}
.brand .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(150deg,var(--ember),var(--gold));
  display:grid;place-items:center;font-size:20px;box-shadow:0 6px 18px rgba(236,106,44,.35)}
.brand b{font-family:'Archivo Black';font-size:15px;line-height:1.05}
.brand small{display:block;color:var(--muted2);font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;
  color:var(--muted);padding:10px 11px;border-radius:9px;font-size:13.5px;font-weight:500;transition:.12s}
.nav button .ic{width:18px;text-align:center}
.nav button:hover{background:var(--panel);color:var(--cream)}
.nav button.on{background:var(--panel2);color:var(--cream)}
.nav button.on .ic{color:var(--ember)}
.side-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:6px}
.side-foot button{background:none;border:1px solid var(--line2);color:var(--muted);padding:8px;border-radius:8px;font-size:11.5px}
.side-foot button:hover{border-color:var(--red);color:var(--red)}
.sync-btn{border-color:var(--line2) !important;color:var(--muted) !important}
.sync-btn:hover{border-color:var(--blue) !important;color:var(--blue) !important}
/* sync status dot */
.sdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--muted2);margin-right:6px;vertical-align:middle}
.sdot.ok{background:var(--green)} .sdot.err{background:var(--red)} .sdot.spin{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* setup banner */
.setup-banner{background:rgba(224,168,62,.08);border:1px solid rgba(224,168,62,.35);border-radius:12px;
  padding:16px 18px;margin-bottom:18px}
.setup-banner h3{color:var(--gold);font-size:14px;margin-bottom:8px}
.setup-banner p{color:var(--muted);font-size:12.5px;margin:0 0 10px;line-height:1.5}
.setup-steps{counter-reset:step}
.setup-steps li{counter-increment:step;list-style:none;position:relative;padding-left:28px;
  font-size:12.5px;color:var(--muted);margin-bottom:6px;line-height:1.5}
.setup-steps li::before{content:counter(step);position:absolute;left:0;top:0;width:18px;height:18px;
  border-radius:50%;background:var(--gold);color:#231a0e;font-size:11px;font-weight:700;display:grid;place-items:center}
.setup-steps li b{color:var(--cream)}
.url-inp{width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--cream);
  padding:9px 12px;border-radius:8px;font-size:12.5px;outline:none;margin-top:6px}
.url-inp:focus{border-color:var(--gold)}
/* main */
.main{flex:1;min-width:0;padding:24px 28px 60px}
.head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.head .ey{color:var(--ember);font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:5px}
.head h1{font-size:28px}
.head p{color:var(--muted);margin:5px 0 0;font-size:13px;max-width:580px}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px}
.kpi .lab{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.kpi .val{font-family:'Space Mono';font-size:24px;font-weight:700;margin-top:7px;line-height:1}
.kpi .sub{color:var(--muted2);font-size:11px;margin-top:6px;font-family:'Space Mono'}
.kpi .val.em{color:var(--ember)}.kpi .val.gd{color:var(--gold)}.kpi .val.gr{color:var(--green)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ph .sub{color:var(--muted2);font-size:12px;margin-top:3px}
/* form */
.field{margin-bottom:12px}
.field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px;font-weight:600;letter-spacing:.02em}
.inp{width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--cream);
  padding:9px 11px;border-radius:8px;font-size:13.5px;outline:none;transition:.12s}
.inp:focus{border-color:var(--ember);box-shadow:0 0 0 3px rgba(236,106,44,.13)}
.inp.mono{font-family:'Space Mono'}
.row{display:grid;gap:10px}
.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}
.slab{margin:14px 0 8px;font-size:11.5px;color:var(--ember);font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  padding-bottom:5px;border-bottom:1px solid var(--line)}
.btn{background:var(--ember);color:#fff;border:none;padding:10px 16px;border-radius:9px;font-weight:600;font-size:13.5px;transition:.13s}
.btn:hover{background:var(--ember-soft)}
.btn.ghost{background:none;border:1px solid var(--line2);color:var(--cream)}
.btn.ghost:hover{border-color:var(--ember);color:var(--ember)}
.btn.gold{background:var(--gold);color:#231a0e}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:7px}
.btn.wpp{background:#1f7a45;color:#fff}.btn.wpp:hover{background:#258a4f}
/* conf box */
.cline{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.cline:last-child{border-bottom:none}
.cline span:last-child{font-family:'Space Mono';font-weight:700}
.cline.tot span:first-child{color:var(--cream);font-weight:700}
.diffbox{margin-top:10px;padding:11px 14px;border-radius:10px;text-align:center;font-size:13.5px}
.diffbox.ok{background:rgba(111,174,106,.12);border:1px solid rgba(111,174,106,.4);color:var(--green)}
.diffbox.bad{background:rgba(216,88,76,.12);border:1px solid rgba(216,88,76,.4)}
.diffbox.bad b{font-family:'Space Mono';font-size:16px;color:#f0907f}
/* table */
table{width:100%;border-collapse:collapse}
th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;padding:8px 9px;border-bottom:1px solid var(--line2)}
td{padding:10px 9px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
td.n,th.n{text-align:right;font-family:'Space Mono'}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.tag.lo{background:rgba(216,88,76,.16);color:#f0907f}
.tag.ok{background:rgba(111,174,106,.16);color:#8fd08a}
.tag.vip{background:rgba(236,106,44,.18);color:#f5a274}
.tag.inat{background:rgba(125,108,82,.2);color:#b8a487}
.tag.fiel{background:rgba(95,160,192,.16);color:#8fc8e0}
.tag.novo{background:rgba(224,168,62,.14);color:#f0c878}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--line2);
  padding:4px 9px;border-radius:16px;font-size:11.5px;margin:2px 3px 2px 0}
.chip b{color:var(--gold)}
.px{cursor:pointer;color:var(--muted2);font-weight:700;padding:0 2px}.px:hover{color:var(--red)}
.empty{color:var(--muted2);text-align:center;padding:24px;font-size:13px}
.alert{background:rgba(216,88,76,.1);border:1px solid rgba(216,88,76,.35);border-radius:10px;
  padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.hint{background:rgba(95,160,192,.07);border:1px solid rgba(95,160,192,.25);border-radius:10px;
  padding:11px 14px;font-size:12px;color:#aecfde;margin-top:12px;line-height:1.5}
.srow{display:grid;grid-template-columns:1fr 100px 24px;gap:7px;align-items:center;margin-bottom:7px}
.mini{font-size:12px;color:var(--muted)}
.split{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;align-items:start}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--green);color:#0e1c0d;padding:12px 20px;border-radius:11px;font-weight:700;font-size:13.5px;
  opacity:0;transition:.3s;box-shadow:0 10px 28px rgba(0,0,0,.4);z-index:99}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{background:var(--red);color:#fff}
details{margin-top:8px;border-top:1px solid var(--line);padding-top:8px}
summary{cursor:pointer;font-size:12.5px;color:var(--muted);font-weight:600}
@media(max-width:860px){
  .side{position:fixed;z-index:50;transform:translateX(-100%);transition:.2s;box-shadow:8px 0 40px rgba(0,0,0,.5)}
  .side.open{transform:none}
  .main{padding:16px 14px 60px}
  .split{grid-template-columns:1fr}
  .c3{grid-template-columns:1fr 1fr}
  .mbtn{display:grid !important}
}
.mbtn{display:none;width:40px;height:40px;border-radius:9px;background:var(--panel);border:1px solid var(--line2);
  place-items:center;color:var(--cream);font-size:17px;margin-bottom:12px}
</style>

<div class="app">
  <aside class="side" id="side">
    <div class="brand"><div class="mark">🍔</div><div><b>Comanda<br>Central</b><small>Hamburgueria</small></div></div>
    <nav class="nav" id="nav">
      <button data-tab="fechamento" class="on"><span class="ic">📝</span>Fechamento</button>
      <button data-tab="balanco"><span class="ic">📊</span>Balanço</button>
      <button data-tab="estoque"><span class="ic">📦</span>Estoque</button>
      <button data-tab="fornecedores"><span class="ic">🚚</span>Fornecedores</button>
      <button data-tab="clientes"><span class="ic">👥</span>Clientes</button>
      <button data-tab="config"><span class="ic">⚙️</span>Configurações</button>
    </nav>
    <div class="side-foot">
      <div style="font-size:11.5px;color:var(--muted);padding:4px 8px"><span class="sdot" id="sdot"></span><span id="slabel">Sem sync</span></div>
      <button class="sync-btn" onclick="syncNow()" style="cursor:pointer">↻ Sincronizar agora</button>
      <button id="resetBtn">↺ Resetar dados</button>
    </div>
  </aside>
  <main class="main">
    <button class="mbtn" id="menuBtn">☰</button>
    <div id="view"></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  CONFIG — URL do Apps Script já configurada
// ============================================================
let SHEET_URL = 'https://script.google.com/macros/s/AKfycbyX44cbwOp7d5ksMQekI_5W_z_fxHf9ZLN3gygKCxctFONFQP0ikgvx3s9cZ0k9qzwgfQ/exec';

// ============================================================
//  ESTADO
// ============================================================
let S = { fechamentos:[], produtos:[], insumos:[], fornecedores:[], clientes:[] };
const KEYS = ['fechamentos','produtos','insumos','fornecedores','clientes'];

// ============================================================
//  GOOGLE SHEETS SYNC
// ============================================================
let syncStatus = 'none'; // none | ok | err | loading
function setSyncStatus(s, msg) {
  syncStatus = s;
  const dot = document.getElementById('sdot');
  const lbl = document.getElementById('slabel');
  if (!dot) return;
  dot.className = 'sdot ' + (s==='ok'?'ok':s==='err'?'err':s==='loading'?'spin':'');
  lbl.textContent = msg || (s==='ok'?'Sincronizado':s==='err'?'Erro sync':s==='loading'?'Sincronizando...':'Offline');
}

async function sheetLoad() {
  if (!SHEET_URL) return false;
  setSyncStatus('loading');
  try {
    const r = await fetch(SHEET_URL + '?action=load', { redirect: 'follow' });
    const j = await r.json();
    if (j.ok && j.data) {
      KEYS.forEach(k => { if (j.data[k] && j.data[k].length > 0) S[k] = j.data[k]; });
      setSyncStatus('ok', 'Atualizado ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
      return true;
    } else { setSyncStatus('err', 'Erro: ' + (j.error||'?')); return false; }
  } catch(e) { setSyncStatus('err', 'Sem conexão'); return false; }
}

async function sheetSave() {
  if (!SHEET_URL) return;
  setSyncStatus('loading');
  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(S)
    });
    // Aguarda 3s e confirma via load
    setTimeout(async () => {
      const ok = await sheetLoad();
      if (!ok) setSyncStatus('err', 'Verifique a conexão');
    }, 3000);
    setSyncStatus('ok', 'Enviado — confirmando...');
  } catch(e) { setSyncStatus('err', 'Sem conexão'); }
}

async function syncNow() {
  const ok = await sheetLoad();
  if (ok) render();
}

// ============================================================
//  UTILS
// ============================================================
const $ = s => document.querySelector(s);
const money = n => 'R$ ' + (Number(n)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const uid = () => Math.random().toString(36).slice(2,9);
const insumo = id => S.insumos.find(i=>i.id===id);
const produto = id => S.produtos.find(p=>p.id===id);
function toast(msg, err) {
  const t = $('#toast'); t.textContent = msg;
  t.className = 'toast show' + (err?' err':'');
  clearTimeout(t._t); t._t = setTimeout(()=>t.className='toast', 2500);
}
// CAMPOS DA CONFERÊNCIA (lógica corrigida conforme comanda real)
const CONF_CAMPOS = [
  {id:'pg_cartao',     label:'Cartão'},
  {id:'pg_cartaocpf',  label:'Cartão CPF'},
  {id:'pg_online',     label:'Pago Online'},
  {id:'pg_voucher',    label:'Online / Voucher'},
  {id:'pg_onlinepix',  label:'Online via PIX'},
  {id:'pg_dinheiro',   label:'Dinheiro'},
  {id:'pg_motoboy',    label:'Motoboy'},
  {id:'pg_colaborador',label:'Colaborador'},
];
function lerConf() {
  const r = {};
  CONF_CAMPOS.forEach(c => r[c.id] = +($('#'+c.id)?.value||0) || 0);
  return r;
}
function somaConf(r) { return CONF_CAMPOS.reduce((a,c)=>a+(r[c.id]||0), 0); }
function custoProd(p) { return (p.ficha||[]).reduce((a,[iid,q])=>{const i=insumo(iid);return a+(i?i.custo*q:0);}, 0); }
function cmvFech(f) { return (f.vendas||[]).reduce((a,v)=>{const p=produto(v.pid);return a+(p?custoProd(p)*v.qtd:0);}, 0); }
function fatF(f) { return +f.totalVendas||0; }

// ============================================================
//  SEED
// ============================================================
function seed() {
  S.insumos = [
    {id:'i1',nome:'Pão brioche',un:'un',qtd:42,min:60,custo:1.20},
    {id:'i2',nome:'Hambúrguer 150g',un:'un',qtd:38,min:80,custo:3.40},
    {id:'i3',nome:'Queijo cheddar',un:'fatia',qtd:120,min:100,custo:0.55},
    {id:'i4',nome:'Bacon',un:'g',qtd:1800,min:1500,custo:0.045},
    {id:'i5',nome:'Batata congelada',un:'g',qtd:9000,min:6000,custo:0.018},
    {id:'i6',nome:'Refrigerante lata',un:'un',qtd:54,min:48,custo:2.10},
  ];
  S.produtos = [
    {id:'p1',nome:'Cheddar Bacon',preco:32,ficha:[['i1',1],['i2',1],['i3',2],['i4',40]]},
    {id:'p2',nome:'Smash Duplo',preco:36,ficha:[['i1',1],['i2',2],['i3',2]]},
    {id:'p3',nome:'Batata G',preco:18,ficha:[['i5',300]]},
    {id:'p4',nome:'Refri lata',preco:8,ficha:[['i6',1]]},
  ];
  S.fornecedores = [
    {id:'f1',nome:'Frigorífico BomBoi',whatsapp:'5547999990001',insumos:['i2','i4']},
    {id:'f2',nome:'Padaria do Zé',whatsapp:'5547999990002',insumos:['i1']},
    {id:'f3',nome:'Distribuidora Sul',whatsapp:'5547999990003',insumos:['i3','i5','i6']},
  ];
  const D=n=>{const x=new Date();x.setDate(x.getDate()-n);return x.toISOString().slice(0,10);};
  S.clientes = [
    {id:'c1',nome:'Marina Alves',whatsapp:'5547988880001',compras:[{data:D(2),valor:64},{data:D(9),valor:50},{data:D(16),valor:72},{data:D(25),valor:40}]},
    {id:'c2',nome:'Rafael Costa',whatsapp:'5547988880002',compras:[{data:D(1),valor:90},{data:D(5),valor:36},{data:D(12),valor:68}]},
    {id:'c3',nome:'Juliana Reis',whatsapp:'5547988880003',compras:[{data:D(48),valor:54},{data:D(70),valor:32}]},
    {id:'c4',nome:'Pedro Lima',whatsapp:'5547988880004',compras:[{data:D(60),valor:120}]},
    {id:'c5',nome:'Bea Souza',whatsapp:'5547988880005',compras:[{data:D(3),valor:44},{data:D(8),valor:44},{data:D(14),valor:44},{data:D(21),valor:44}]},
  ];
  // Exemplo 20/06 baseado na comanda real
  S.fechamentos = [
    {id:'fc01',data:D(2),caixa:'Ana',
     conf:{pg_cartao:1980.40,pg_cartaocpf:0,pg_online:210.00,pg_voucher:0,pg_onlinepix:880.50,pg_dinheiro:181.20,pg_motoboy:0,pg_colaborador:38},
     totalVendas:3290.10,trocoInicio:120,trocoFinal:90,motoboyRepasse:128,motoboyPix:0,saidas:[],
     vendas:[{pid:'p1',qtd:9},{pid:'p2',qtd:7},{pid:'p3',qtd:12},{pid:'p4',qtd:14}],obs:''},
    {id:'fc02',data:D(1),caixa:'Ana',
     conf:{pg_cartao:2240.00,pg_cartaocpf:0,pg_online:140.00,pg_voucher:25,pg_onlinepix:1010.00,pg_dinheiro:0,pg_motoboy:260,pg_colaborador:45},
     totalVendas:3720.00,trocoInicio:100,trocoFinal:100,motoboyRepasse:190,motoboyPix:260,saidas:[],
     vendas:[{pid:'p1',qtd:11},{pid:'p2',qtd:9},{pid:'p3',qtd:15},{pid:'p4',qtd:18}],obs:'Motoboy via PIX'},
    {id:'fc03',data:D(0),caixa:'Ana',
     conf:{pg_cartao:2112.86,pg_cartaocpf:0,pg_online:169.54,pg_voucher:19.09,pg_onlinepix:951.79,pg_dinheiro:0,pg_motoboy:237,pg_colaborador:40.50},
     totalVendas:3530.78,trocoInicio:114.80,trocoFinal:80.80,motoboyRepasse:167,motoboyPix:0,saidas:[],
     vendas:[{pid:'p1',qtd:10},{pid:'p2',qtd:8},{pid:'p3',qtd:13},{pid:'p4',qtd:16}],obs:'Comanda 20/06'},
  ];
}

// ============================================================
//  NAV
// ============================================================
let tab = 'fechamento';
$('#nav').addEventListener('click', e => {
  const b = e.target.closest('button'); if(!b||!b.dataset.tab) return;
  tab = b.dataset.tab;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('on',x===b));
  $('#side').classList.remove('open'); render();
});
$('#menuBtn').addEventListener('click',()=>$('#side').classList.toggle('open'));
$('#resetBtn').addEventListener('click', async()=>{
  if(!confirm('Resetar todos os dados de exemplo?')) return;
  seed(); await sheetSave(); toast('Dados resetados'); render();
});

function render() {
  ({fechamento:renderFechamento,balanco:renderBalanco,estoque:renderEstoque,
    fornecedores:renderFornecedores,clientes:renderClientes,config:renderConfig}[tab])();
}

// ============================================================
//  FECHAMENTO
// ============================================================
let draftSaidas = [], draftVendas = [], editandoId = null;

function renderFechamento() {
  if (!draftVendas.length) draftVendas = S.produtos.map(p=>({pid:p.id,qtd:0}));
  const hoje = new Date().toISOString().slice(0,10);
  const modoEdicao = !!editandoId;

function atualizarConf() {
  const r = lerConf();
  const soma = somaConf(r);
  const total = +$('#f_total')?.value || 0;
  const diff = total - soma;
  const ok = Math.abs(diff) < 0.02;

  // mini-linhas na caixa de conf acima do botão
  $('#conf_box').innerHTML = `<div class="diffbox ${ok?'ok':'bad'}" style="margin-bottom:10px">
    ${ok ? `✅ Conferência OK — soma = ${money(soma)}` :
    `<div>Soma dos recebimentos: <b style="font-family:'Space Mono'">${money(soma)}</b></div>
     <div style="margin-top:4px">Total de vendas: <b style="font-family:'Space Mono'">${money(total)}</b></div>
     <div style="margin-top:6px">⚠️ Diferença: <b>${money(diff)}</b></div>`}
  </div>`;

  // painel lateral
  $('#conf_resumo').innerHTML =
    CONF_CAMPOS.map(c=>`<div class="cline"><span>${c.label}</span><span>${money(r[c.id]||0)}</span></div>`).join('')+
    `<div class="cline tot"><span>Soma total</span><span style="color:var(--ember)">${money(soma)}</span></div>
     <div class="cline tot"><span>Total vendas</span><span>${money(total)}</span></div>
     <div class="diffbox ${ok?'ok':'bad'}" style="margin-top:10px">
       ${ok?`✅ Caixa confere`:`⚠️ Diferença: <b>${money(diff)}</b>`}
     </div>`;
}

function renderVendasBox() {
  const box = $('#vendas_box');
  box.innerHTML = S.produtos.map(p=>{
    const dv = draftVendas.find(v=>v.pid===p.id)||{qtd:0};
    return `<div class="srow" style="grid-template-columns:1fr 75px 20px">
      <div class="mini">${p.nome}</div>
      <input class="inp mono" type="number" min="0" data-pid="${p.id}" value="${dv.qtd||''}" placeholder="0">
      <span class="mini">un</span></div>`;
  }).join('') || '<div class="mini" style="color:var(--muted2)">Sem produtos cadastrados</div>';
  box.querySelectorAll('input').forEach(el=>el.addEventListener('input',e=>{
    const pid=e.target.dataset.pid,q=+e.target.value||0;
    const v=draftVendas.find(x=>x.pid===pid); if(v)v.qtd=q; else draftVendas.push({pid,qtd:q});
  }));
}

function renderSaidaBox() {
  const box = $('#saida_box');
  box.innerHTML = draftSaidas.map((s,i)=>`<div class="srow"><input class="inp" data-i="${i}" data-k="desc" value="${s.desc}" placeholder="descrição">
    <input class="inp mono" type="number" data-i="${i}" data-k="valor" value="${s.valor}" placeholder="0">
    <span class="px" data-del="${i}">✕</span></div>`).join('');
  box.querySelectorAll('input').forEach(el=>el.addEventListener('input',e=>{draftSaidas[+e.target.dataset.i][e.target.dataset.k]=e.target.value;}));
  box.querySelectorAll('[data-del]').forEach(x=>x.onclick=()=>{draftSaidas.splice(+x.dataset.del,1);renderSaidaBox();});
}

async function salvarFechamento() {
  const r = lerConf();
  const soma = somaConf(r);
  const total = +$('#f_total').value||0;
  if (soma <= 0 && total <= 0) { toast('Preencha os valores do turno', true); return; }
  const f = {
    id: editandoId || uid(),
    data:$('#f_data').value, caixa:$('#f_caixa').value,
    conf:r, totalVendas:total,
    trocoInicio:+$('#f_ti').value||0, trocoFinal:+$('#f_tf').value||0,
    motoboyRepasse:+$('#f_mrep').value||0, motoboyPix:+$('#f_mpix').value||0,
    saidas:draftSaidas.filter(s=>s.valor).map(s=>({desc:s.desc,valor:+s.valor})),
    vendas:draftVendas.filter(v=>v.qtd>0).map(v=>({pid:v.pid,qtd:v.qtd})),
    obs:$('#f_obs').value
  };
  if (editandoId) {
    // Substitui o registro existente
    const idx = S.fechamentos.findIndex(x=>x.id===editandoId);
    if (idx>=0) S.fechamentos[idx] = f; else S.fechamentos.push(f);
    editandoId = null;
    toast('Fechamento atualizado no Sheets');
  } else {
    // Baixa de estoque só em registros novos
    f.vendas.forEach(v=>{const p=produto(v.pid);if(p)(p.ficha||[]).forEach(([iid,q])=>{const i=insumo(iid);if(i)i.qtd=Math.max(0,i.qtd-q*v.qtd);});});
    S.fechamentos.push(f);
    toast('Fechamento salvo e enviado para o Sheets');
  }
  await sheetSave();
  draftSaidas=[]; draftVendas=[];
  render();
}

function fmtData(d) {
  if (!d) return '—';
  // Normaliza qualquer formato de data para DD/MM
  try {
    const s = typeof d === 'string' ? d : new Date(d).toISOString();
    const parte = s.slice(0,10); // pega YYYY-MM-DD
    return parte.slice(5).split('-').reverse().join('/');
  } catch(e) { return String(d).slice(0,10); }
}

function fmtDataFull(d) {
  if (!d) return '';
  try {
    const s = typeof d === 'string' ? d : new Date(d).toISOString();
    return s.slice(0,10); // YYYY-MM-DD para o input date
  } catch(e) { return ''; }
}

function renderUltimos() {
  const last = [...S.fechamentos]
    .filter(f => f.id && (f.data || fatF(f) > 0))
    .sort((a,b) => fmtDataFull(b.data).localeCompare(fmtDataFull(a.data)))
    .slice(0,10);
  $('#ult_list').innerHTML = last.length
    ? `<table><thead><tr><th>Data</th><th>Caixa</th><th class="n">Total</th><th></th></tr></thead><tbody>`+
      last.map(f=>`<tr>
        <td class="mini" style="font-family:'Space Mono'">${fmtData(f.data)}</td>
        <td>${f.caixa||'—'}</td>
        <td class="n">${money(fatF(f))}</td>
        <td style="white-space:nowrap">
          <button class="btn ghost sm" data-edit="${f.id}" style="margin-right:4px">✏️</button>
          <button class="btn sm" data-del="${f.id}" style="background:rgba(216,88,76,.2);color:#f0907f;border:none">🗑</button>
        </td></tr>`).join('')+'</tbody></table>'
    : '<div class="empty">Nenhum fechamento ainda</div>';

  document.querySelectorAll('[data-edit]').forEach(btn=>btn.onclick=()=>{
    editandoId = btn.dataset.edit;
    draftSaidas=[]; draftVendas=[];
    renderFechamento();
    window.scrollTo(0,0);
  });
  document.querySelectorAll('[data-del]').forEach(btn=>btn.onclick=async()=>{
    const f = S.fechamentos.find(x=>x.id===btn.dataset.del);
    if(!f) return;
    if(!confirm(`Excluir fechamento de ${f.data}? Essa ação não tem volta.`)) return;
    S.fechamentos = S.fechamentos.filter(x=>x.id!==btn.dataset.del);
    await sheetSave();
    toast('Fechamento excluído');
    renderUltimos();
  });
}

let _charts = {};
function renderBalanco() {
  const fs = [...S.fechamentos].sort((a,b)=>a.data.localeCompare(b.data));
  // Filtra só fechamentos com total de vendas > 0
  const validos = fs.filter(f => fatF(f) > 0);
  if (!validos.length) {
    view.innerHTML='<div class="head"><div><div class="ey">Análise</div><h1>Balanço</h1></div></div><div class="panel"><div class="empty">Salve fechamentos com valores para ver o balanço.</div></div>';
    return;
  }
  const cut = new Date(); cut.setDate(cut.getDate()-30);
  const win = validos.filter(f=>f.data >= cut.toISOString().slice(0,10));
  const base = win.length ? win : validos; // fallback se nenhum nos últimos 30 dias
  const fatT = base.reduce((a,f)=>a+fatF(f), 0);
  const cmvT = base.reduce((a,f)=>a+cmvFech(f), 0);
  const motT = base.reduce((a,f)=>a+(+(f.conf?.pg_motoboy||0)), 0);
  const colT = base.reduce((a,f)=>a+(+(f.conf?.pg_colaborador||0)), 0);
  const mix = {Cartão:0,Online:0,'PIX Online':0,Dinheiro:0,Motoboy:0,Colaborador:0};
  base.forEach(f=>{const c=f.conf||{};
    mix.Cartão+=(+c.pg_cartao||0)+(+c.pg_cartaocpf||0);
    mix.Online+=(+c.pg_online||0)+(+c.pg_voucher||0);
    mix['PIX Online']+=(+c.pg_onlinepix||0);
    mix.Dinheiro+=(+c.pg_dinheiro||0);
    mix.Motoboy+=(+c.pg_motoboy||0);
    mix.Colaborador+=(+c.pg_colaborador||0);
  });
  const mixTotal = Object.values(mix).reduce((a,b)=>a+b,0);
  const prodMap={};
  base.forEach(f=>(f.vendas||[]).forEach(v=>{prodMap[v.pid]=(prodMap[v.pid]||0)+v.qtd;}));
  const topProd = Object.entries(prodMap).map(([pid,q])=>({p:produto(pid),q})).filter(x=>x.p).sort((a,b)=>b.q-a.q);

  view.innerHTML = `
  <div class="head"><div><div class="ey">${win.length?'Últimos 30 dias':'Todos os registros'}</div><h1>Balanço</h1></div></div>
  <div class="grid kpis" style="margin-bottom:14px">
    <div class="card kpi"><div class="lab">Total de Vendas</div><div class="val em">${money(fatT)}</div><div class="sub">${base.length} dias</div></div>
    <div class="card kpi"><div class="lab">Média/dia</div><div class="val">${money(base.length?fatT/base.length:0)}</div></div>
    <div class="card kpi"><div class="lab">Motoboy</div><div class="val gd">${money(motT)}</div><div class="sub">${fatT?(motT/fatT*100).toFixed(1):0}% do total</div></div>
    <div class="card kpi"><div class="lab">Colaborador</div><div class="val">${money(colT)}</div></div>
    ${cmvT?`<div class="card kpi"><div class="lab">CMV (fichas)</div><div class="val">${money(cmvT)}</div><div class="sub">${fatT?(cmvT/fatT*100).toFixed(0):0}%</div></div>`:''}
  </div>
  <div class="split" style="margin-bottom:14px">
    <div class="panel"><div class="ph"><h3>Total de vendas por dia</h3></div><canvas id="ch1" height="150"></canvas></div>
    ${mixTotal>0?`<div class="panel"><div class="ph"><h3>Mix de recebimentos</h3></div><canvas id="ch2" height="150"></canvas></div>`:''}
  </div>
  ${topProd.length?`<div class="panel"><div class="ph"><h3>Produtos (quando lançados no fechamento)</h3></div>
    <table><thead><tr><th>Produto</th><th class="n">Qtd</th><th class="n">Receita</th><th class="n">Custo un.</th><th class="n">Margem un.</th></tr></thead><tbody>
    ${topProd.map(({p,q})=>{const cu=custoProd(p);return `<tr><td>${p.nome}</td><td class="n">${q}</td><td class="n">${money(p.preco*q)}</td><td class="n">${money(cu)}</td><td class="n" style="color:var(--green)">${money(p.preco-cu)}</td></tr>`;}).join('')}
    </tbody></table></div>`:''}`;

  const cv = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  Chart.defaults.color=cv('--muted'); Chart.defaults.font.family='Inter'; Chart.defaults.borderColor=cv('--line');
  Object.values(_charts).forEach(c=>{try{c.destroy()}catch(e){}});
  const days = base.map(f=>fmtData(f.data));
  _charts.a = new Chart($('#ch1'),{type:'bar',data:{labels:days,datasets:[{label:'Total Vendas',data:base.map(fatF),backgroundColor:cv('--ember'),borderRadius:4}]},
    options:{plugins:{legend:{display:false}},scales:{y:{grid:{color:cv('--line')}},x:{grid:{display:false}}}}});
  if (mixTotal > 0 && $('#ch2')) {
    _charts.b = new Chart($('#ch2'),{type:'doughnut',data:{labels:Object.keys(mix),datasets:[{data:Object.values(mix),backgroundColor:[cv('--blue'),cv('--gold'),cv('--ember'),cv('--green'),cv('--red'),cv('--muted2')],borderWidth:0}]},
      options:{cutout:'62%',plugins:{legend:{position:'right',labels:{boxWidth:10,padding:8}}}}});
  }
}

async function editarInsumo(id){
  const i=insumo(id);if(!i)return;
  const nome=prompt('Nome:',i.nome);if(nome===null)return;
  const un=prompt('Unidade:',i.un)||i.un;
  const min=prompt('Estoque mínimo:',i.min);
  const custo=prompt('Custo unitário (R$):',i.custo);
  const qtd=prompt('Quantidade atual:',i.qtd);
  i.nome=nome||i.nome; i.un=un; i.min=+min||i.min; i.custo=+custo||i.custo; i.qtd=+qtd||i.qtd;
  await sheetSave();toast('Insumo atualizado');renderEstoque();
}

function diasDesde(d){return Math.floor((Date.now()-new Date(d).getTime())/864e5);}
function diasDesde(d){return Math.floor((Date.now()-new Date(d).getTime())/864e5);}

// Temperatura baseada em recência + frequência
function temperatura(c){
  const rec = c.diasUltimoPedido!=null ? +c.diasUltimoPedido : 9999;
  const comp = +c.compras || (c.comprasLegado||[]).length || 0;
  if(rec<=15 && comp>=5) return 'quente';
  if(rec<=30 && comp>=2) return 'quente';
  if(rec<=45) return 'morna';
  return 'fria';
}
function tempLabel(t){return t==='quente'?'🔥 Quente':t==='morna'?'🌡️ Morna':'🧊 Fria';}
function tempColor(t){return t==='quente'?'var(--ember)':t==='morna'?'var(--gold)':'var(--blue)';}
function tempTag(t){return t==='quente'?'vip':t==='morna'?'mid':'inat';}

function parsarCSVClientes(texto){
  const linhas=texto.trim().split('\n');
  if(linhas.length<2)return[];
  const sep=linhas[0].includes(';')?';':',';
  const headers=linhas[0].split(sep).map(h=>h.trim().replace(/"/g,'').toLowerCase());
  const col=(names)=>{for(const n of names){const i=headers.findIndex(h=>h.includes(n));if(i>=0)return i;}return -1;};
  const iNome=col(['cliente','nome','name']);
  const iTel=col(['telefone','tel','phone','whatsapp','celular','fone']);
  const iBairro=col(['bairro','neighborhood']);
  const iUltimo=col(['último pedido','ultimo pedido','last order','último','data']);
  const iCompras=col(['compras','pedidos','orders','qtd']);
  const iFat=col(['faturado','total','receita','valor']);
  const iTicket=col(['ticket','ticket médio','média']);
  const iOrigem=col(['origem','canal','source']);
  const iDesde=col(['cliente desde','desde','membro']);
  const clientes=[];
  for(let i=1;i<linhas.length;i++){
    const row=linhas[i].split(sep).map(c=>c.trim().replace(/"/g,''));
    if(!row[iNome]||!row[iNome].trim())continue;
    let diasUltimoPedido=9999;
    if(iUltimo>=0&&row[iUltimo]){
      const raw=row[iUltimo];
      const mBR=raw.match(/(\d{2})\/(\d{2})\/(\d{4})/);
      const mISO=raw.match(/(\d{4})-(\d{2})-(\d{2})/);
      if(mBR)diasUltimoPedido=diasDesde(`${mBR[3]}-${mBR[2]}-${mBR[1]}`);
      else if(mISO)diasUltimoPedido=diasDesde(mISO[0]);
    }
    let wpp=iTel>=0?row[iTel]:'';
    wpp=wpp.replace(/\D/g,'');
    if(wpp.length===11)wpp='55'+wpp;
    const fatVal=iFat>=0?+row[iFat].replace(/[R$\s.]/g,'').replace(',','.'):0;
    const ticketVal=iTicket>=0?+row[iTicket].replace(/[R$\s.]/g,'').replace(',','.'):0;
    const comprasVal=iCompras>=0?+row[iCompras]:0;
    clientes.push({id:uid(),nome:row[iNome],whatsapp:wpp,
      bairro:iBairro>=0?row[iBairro]:'',origem:iOrigem>=0?row[iOrigem]:'',
      clienteDesde:iDesde>=0?row[iDesde]:'',ultimoPedidoRaw:iUltimo>=0?row[iUltimo]:'',
      diasUltimoPedido,compras:comprasVal,faturado:fatVal,
      ticketMedio:ticketVal||(comprasVal>0?fatVal/comprasVal:0),comprasLegado:[]});
  }
  return clientes;
}
